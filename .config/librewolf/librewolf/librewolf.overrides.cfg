// vim:ts=2:sw=2:expandtab:ft=javascript

defaultPref("full-screen-api.ignore-widgets", true);
defaultPref("widget.use-xdg-desktop-portal.file-picker", 1);
defaultPref("widget.use-xdg-desktop-portal.location", 1);
defaultPref("widget.use-xdg-desktop-portal.mime-handler", 1);
defaultPref("widget.use-xdg-desktop-portal.open-uri", 1);
defaultPref("widget.use-xdg-desktop-portal.settings", 1);

defaultPref("privacy.resistFingerprinting", false);
defaultPref("identity.fxaccounts.enabled", true);
defaultPref("middlemouse.paste", false);
defaultPref("general.autoScroll", true);
defaultPref("general.autoscroll.prevent_to_collapse_selection_by_middle_mouse_down", true);
defaultPref("webgl.disabled", false);

defaultPref("browser.bookmarks.openInTabClosesMenu", false);
defaultPref("browser.menu.showViewImageInfo", true);
defaultPref("findbar.highlightAll", true);
defaultPref("browser.download.open_pdf_attachments_inline", true);
defaultPref("pdfjs.sidebarViewOnLoad", 2);

defaultPref("browser.urlbar.suggest.engines", false);
defaultPref("browser.urlbar.suggest.topsites", false);
defaultPref("browser.urlbar.suggest.calculator", true);
defaultPref("browser.urlbar.unitConversion.enabled", true);

// Required for custom CSS
defaultPref("svg.context-properties.content.enabled", true);

// Add .lan as a TLD
defaultPref("browser.fixup.domainsuffixwhitelist.lan", true);

lockPref("privacy.sanitize.sanitizeOnShutdown", false);
lockPref("privacy.clearOnShutdown.cookies", false);
lockPref("privacy.clearOnShutdown.cache", true);
lockPref("privacy.clearOnShutdown.downloads", false);
lockPref("privacy.clearOnShutdown.history", false);
lockPref("privacy.clearOnShutdown.offlineApps", false);
lockPref("privacy.clearOnShutdown.sessions", false);
lockPref("privacy.clearOnShutdown.siteSettings", false);
lockPref("signon.rememberSignons", false);
lockPref("browser.newtabpage.activity-stream.feeds.topsites", false);
lockPref("browser.newtabpage.activity-stream.feeds.adsfeed", false);
lockPref("browser.newtabpage.activity-stream.feeds.discoverystreamfeed", false);
lockPref("browser.newtabpage.activity-stream.feeds.recommendationprovider", false);
lockPref("browser.newtabpage.activity-stream.feeds.topsites", false);
lockPref("browser.newtabpage.activity-stream.feeds.topstories", false);
lockPref("browser.newtabpage.activity-stream.feeds.section.highlights", false);

// Disable annoying onboarding feature: "Select this shortcut to find what you need faster."
lockPref("browser.urlbar.tabToSearch.onboard.interactionsLeft", 0);

// Prevent websites from accessing local addresses
lockPref("network.lna.blocking", true);
lockPref("network.lna.local-network-to-localhost.skip-checks", false);
lockPref("network.lna.websocket.enabled", true);

// Disable AI features
lockPref("browser.ml.enable", false);
lockPref("browser.ml.chat.enabled", false);
lockPref("browser.ml.chat.hideFromLabs", true);
lockPref("browser.ml.chat.hideLabsShortcuts", true);
lockPref("browser.ml.chat.page", false);
lockPref("browser.ml.chat.page.footerBadge", false);
lockPref("browser.ml.chat.page.menuBadge", false);
lockPref("browser.ml.chat.menu", false);
lockPref("browser.ml.linkPreview.enabled", false);
lockPref("browser.ml.pageAssist.enabled", false);
lockPref("browser.tabs.groups.smart.enabled", false);
lockPref("browser.tabs.groups.smart.userEnabled", false);
lockPref("extensions.ml.enabled", false);

// userchrome customization
lockPref("toolkit.legacyUserProfileCustomizations.stylesheets", true);
lockPref("dom.allow_scripts_to_close_windows", true);

// userchromejs loader
try {
  let cmanifest = Components.classes['@mozilla.org/file/directory_service;1']
    .getService(Components.interfaces.nsIProperties)
    .get('UChrm', Components.interfaces.nsIFile);

  cmanifest.append('userchromejs');
  cmanifest.append('chrome.manifest');

  if (cmanifest.exists()) {
    Components.manager
      .QueryInterface(Components.interfaces.nsIComponentRegistrar)
      .autoRegister(cmanifest);
    ChromeUtils.importESModule('chrome://userchromejs/content/boot.sys.mjs');
  }
} catch(e) {}
